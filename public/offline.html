<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmtsKlar — Offline</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #EEF4FB; margin: 0;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: white; border-radius: 16px; padding: 48px 32px; max-width: 400px;
           text-align: center; box-shadow: 0 4px 24px rgba(15,36,64,0.08); }
    h1 { color: #0F2440; font-size: 22px; margin-bottom: 12px; }
    p { color: #2A5080; line-height: 1.7; margin-bottom: 28px; }
    a { background: linear-gradient(135deg,#B8832A,#D4A84B); color: white;
        padding: 13px 28px; border-radius: 12px; text-decoration: none;
        font-weight: 700; display: inline-block; }
    .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📶</div>
    <h1>Keine Internetverbindung</h1>
    <p>AmtsKlar benötigt eine Internetverbindung für die Analyse. Bitte prüfe deine Verbindung und versuche es erneut.</p>
    <a href="/" onclick="window.location.reload()">Erneut versuchen</a>
  </div>
</body>
</html>
