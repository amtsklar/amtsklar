<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AmtsKlar</title>
  <script>
    // SPA Routing für Cloudflare Pages:
    // Wenn 404 → Pfad speichern → zu / weiterleiten
    // main.tsx liest den Pfad und stellt ihn wieder her
    var path = window.location.pathname + window.location.search;
    if (path !== '/') {
      sessionStorage.setItem('__amtsklar_path', path);
    }
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
